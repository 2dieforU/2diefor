<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — 2DieFor Guestbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f5f0;
    --accent: #c8ff00;
    --gray: #1a1a1a;
    --muted: #888;
    --red: #e8202a;
    --green: #1db954;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 2rem 1.5rem 5rem;
  }

  @media (min-width: 900px) { body { padding: 3rem 4rem 6rem; } }

  .admin-header {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    flex-wrap: wrap;
  }

  .admin-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.1em;
    text-decoration: none;
    color: var(--white);
  }

  .admin-logo span { color: var(--accent); }

  .admin-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.15em;
    color: var(--muted);
  }

  .tab-bar {
    display: flex;
    gap: 2px;
    margin-bottom: 2rem;
  }

  .tab-btn {
    background: var(--gray);
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .tab-btn.active { background: var(--accent); color: var(--black); font-weight: 500; }
  .tab-btn:hover:not(.active) { color: var(--white); }

  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--red);
    color: #fff;
    font-size: 0.6rem;
    font-weight: 700;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    margin-left: 0.4rem;
    vertical-align: middle;
  }

  .stats-bar {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--gray);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 0.75rem 1.2rem;
    min-width: 100px;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    line-height: 1;
    color: var(--accent);
  }

  .stat-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.3rem;
  }

  .loading {
    color: var(--muted);
    font-size: 0.9rem;
    padding: 2rem 0;
  }

  .empty {
    color: var(--muted);
    font-size: 0.9rem;
    padding: 2rem 0;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .msg-card {
    border: 1px solid rgba(255,255,255,0.07);
    margin-bottom: 1rem;
    background: var(--gray);
    animation: fadeIn 0.3s forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .msg-top {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.9rem 1.2rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    flex-wrap: wrap;
  }

  .msg-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.06em;
  }

  .msg-song {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(200,255,0,0.08);
    border: 1px solid rgba(200,255,0,0.2);
    padding: 0.15rem 0.5rem;
  }

  .msg-country {
    font-size: 0.72rem;
    color: var(--muted);
  }

  .msg-date {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.2);
    margin-left: auto;
    letter-spacing: 0.05em;
  }

  .msg-status {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.15rem 0.5rem;
    border: 1px solid;
  }

  .msg-status.pending { color: #f0a500; border-color: rgba(240,165,0,0.3); }
  .msg-status.approved { color: var(--green); border-color: rgba(29,185,84,0.3); }
  .msg-status.rejected { color: var(--red); border-color: rgba(232,32,42,0.3); }

  .msg-body {
    padding: 1rem 1.2rem;
    font-size: 0.9rem;
    line-height: 1.8;
    color: rgba(245,245,240,0.75);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .msg-actions {
    display: flex;
    gap: 0.5rem;
    padding: 0.75rem 1.2rem;
  }

  .btn-approve, .btn-reject, .btn-delete {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 0.45rem 1rem;
    border: none;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }

  .btn-approve { background: var(--green); color: #000; }
  .btn-reject { background: transparent; border: 1px solid rgba(232,32,42,0.4); color: var(--red); }
  .btn-delete { background: transparent; border: 1px solid rgba(255,255,255,0.1); color: var(--muted); margin-left: auto; }

  .btn-approve:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-reject:hover { background: rgba(232,32,42,0.08); }
  .btn-delete:hover { border-color: var(--red); color: var(--red); }

  .btn-approve:disabled, .btn-reject:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .refresh-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.45rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 1.5rem;
  }

  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--accent);
    color: var(--black);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.75rem 1.5rem;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="admin-header">
  <a href="index.html" class="admin-logo">2<span>DIE</span>FOR</a>
  <div class="admin-title">Guestbook Admin</div>
</div>

<div class="stats-bar">
  <div class="stat">
    <div class="stat-num" id="stat-pending">—</div>
    <div class="stat-label">Pending</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="stat-approved">—</div>
    <div class="stat-label">Approved</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="stat-rejected">—</div>
    <div class="stat-label">Rejected</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="stat-total">—</div>
    <div class="stat-label">Total</div>
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" id="tab-pending" onclick="switchTab('pending')">
    Pending <span class="badge" id="badge-pending" style="display:none">0</span>
  </button>
  <button class="tab-btn" id="tab-approved" onclick="switchTab('approved')">Approved</button>
  <button class="tab-btn" id="tab-rejected" onclick="switchTab('rejected')">Rejected</button>
  <button class="tab-btn" id="tab-all" onclick="switchTab('all')">All</button>
</div>

<button class="refresh-btn" onclick="loadMessages()">↻ Refresh</button>

<div id="messages-container">
  <div class="loading">Loading messages...</div>
</div>

<div class="toast" id="toast"></div>

<script>
  const BIN_ID = '69b9748cc3097a1dd533101e';
  const API_KEY = atob('JDJhJDEwJDhWblluM1IzR3UzSU56YlV3dEhtTmVPdzUzR1VXN243Tkg1RXNVNzFndTd2YWUza2tXaVRp');
  const BASE_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

  let allMessages = [];
  let currentTab = 'pending';

  window.addEventListener('load', loadMessages);

  async function loadMessages() {
    const container = document.getElementById('messages-container');
    container.innerHTML = '<div class="loading">Loading...</div>';
    try {
      const res = await fetch(BASE_URL + '/latest', {
        headers: { 'X-Master-Key': API_KEY }
      });
      const data = await res.json();
      allMessages = data.record.messages || [];
      updateStats();
      renderTab(currentTab);
    } catch(err) {
      container.innerHTML = '<div class="empty">Failed to load. Check your connection.</div>';
    }
  }

  function updateStats() {
    const pending  = allMessages.filter(m => m.status === 'pending').length;
    const approved = allMessages.filter(m => m.status === 'approved').length;
    const rejected = allMessages.filter(m => m.status === 'rejected').length;

    document.getElementById('stat-pending').textContent  = pending;
    document.getElementById('stat-approved').textContent = approved;
    document.getElementById('stat-rejected').textContent = rejected;
    document.getElementById('stat-total').textContent    = allMessages.length;

    const badge = document.getElementById('badge-pending');
    if (pending > 0) {
      badge.textContent = pending;
      badge.style.display = 'inline-flex';
    } else {
      badge.style.display = 'none';
    }
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    renderTab(tab);
  }

  function renderTab(tab) {
    const container = document.getElementById('messages-container');
    let msgs = tab === 'all' ? [...allMessages] : allMessages.filter(m => m.status === tab);
    msgs = msgs.reverse();

    if (msgs.length === 0) {
      container.innerHTML = `<div class="empty">No ${tab === 'all' ? '' : tab} messages.</div>`;
      return;
    }

    container.innerHTML = '';
    msgs.forEach((msg, i) => {
      const idx = allMessages.indexOf(msg);
      const card = document.createElement('div');
      card.className = 'msg-card';
      card.style.animationDelay = (i * 0.04) + 's';
      card.id = 'msg-' + idx;

      const canApprove = msg.status !== 'approved';
      const canReject  = msg.status !== 'rejected';

      card.innerHTML = `
        <div class="msg-top">
          <div class="msg-name">${esc(msg.name)}</div>
          ${msg.song    ? `<div class="msg-song">${esc(msg.song)}</div>` : ''}
          ${msg.country ? `<div class="msg-country">📍 ${esc(msg.country)}</div>` : ''}
          <div class="msg-status ${msg.status}">${msg.status}</div>
          <div class="msg-date">${formatDate(msg.date)}</div>
        </div>
        <div class="msg-body">${esc(msg.message).replace(/\n/g, '<br>')}</div>
        <div class="msg-actions">
          <button class="btn-approve" onclick="setStatus(${idx}, 'approved')" ${!canApprove ? 'disabled' : ''}>✓ Approve</button>
          <button class="btn-reject"  onclick="setStatus(${idx}, 'rejected')" ${!canReject  ? 'disabled' : ''}>✕ Reject</button>
          <button class="btn-delete"  onclick="deleteMsg(${idx})">Delete</button>
        </div>
      `;
      container.appendChild(card);
    });
  }

  async function setStatus(idx, status) {
    allMessages[idx].status = status;
    await save();
    updateStats();
    renderTab(currentTab);
    showToast(status === 'approved' ? '✓ Message approved' : '✕ Message rejected');
  }

  async function deleteMsg(idx) {
    if (!confirm('Permanently delete this message?')) return;
    allMessages.splice(idx, 1);
    await save();
    updateStats();
    renderTab(currentTab);
    showToast('Message deleted');
  }

  async function save() {
    await fetch(BASE_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY
      },
      body: JSON.stringify({ messages: allMessages })
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }
</script>

</body>
</html>
